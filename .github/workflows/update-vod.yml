name: Update VOD Predictions

on:
  schedule:
    - cron: '0 2 * * *' # Tourne tous les jours à 2h00 UTC
  workflow_dispatch: # Permet de le lancer manuellement avec un bouton

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run VOD Script
        run: node scripts/update-vod.js

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/plex-upcoming.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update VOD predictions" && git push)
