<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinoche FR - Votre Bibliothèque Media</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary-color: #00d4ff;
    --accent-color: #ff8c00;
    --bg-dark: #0f0f0f;
    --card-bg: #1a1a1a;
  }

  body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 0;
    background-color: var(--bg-dark);
    color: #ffffff;
    overflow-x: hidden;
  }

  /* Header style Glassmorphism */
  .header {
    background-color: rgba(0, 0, 0, 0.9);
    backdrop-filter: blur(15px);
    padding: 15px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }

  .header-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1250px;
    margin: 0 auto;
    padding: 0 20px;
    flex-wrap: wrap;
    gap: 15px;
  }

  .logo-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 32px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: -1px;
    cursor: default;
    background: linear-gradient(to right, #ffffff, var(--primary-color));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.5));
    transition: filter 0.3s ease;
  }

  .logo-title:hover {
    filter: drop-shadow(0 0 15px rgba(0, 212, 255, 0.8));
  }

  .search-container {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }

  .search-bar {
    display: flex;
    align-items: center;
    background: rgba(255, 255, 255, 0.07);
    border-radius: 50px;
    padding: 6px 18px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.3s ease;
  }

  .search-bar:focus-within {
    background: rgba(255, 255, 255, 0.12);
    border-color: var(--primary-color);
    box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
  }

  .search-input {
    background: transparent;
    padding: 8px;
    border: none;
    color: white;
    width: 220px;
    outline: none;
    font-size: 14px;
  }

  .search-options {
    display: flex;
    gap: 12px;
    margin-top: 8px;
    font-size: 10px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .search-options label {
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* Catégories */
  .categories {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 35px 0;
    flex-wrap: wrap;
  }

  .category-button {
    background: rgba(255, 255, 255, 0.04);
    color: #bbb;
    border: 1px solid rgba(255, 255, 255, 0.08);
    padding: 10px 24px;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 13px;
    font-weight: 500;
    text-transform: uppercase;
    text-decoration: none;
  }

  .category-button:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: var(--accent-color);
    color: white;
    transform: translateY(-2px);
  }

  .category-button.active {
    background: linear-gradient(45deg, var(--primary-color), #00a8cc);
    border: none;
    color: #000;
    font-weight: 700;
    box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
  }

  /* Grille & Cartes */
  .movie-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 30px;
    margin-top: 20px;
    padding-bottom: 50px;
  }

  .movie-card {
    background-color: var(--card-bg);
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    cursor: pointer;
    border: 1px solid rgba(255, 255, 255, 0.03);
  }

  .movie-card:hover {
    transform: translateY(-8px);
    border-color: var(--primary-color);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
  }

  /* SKELETON ANIMATION */
  .skeleton {
    background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
    background-size: 200% 100%;
    animation: skeleton-loading 1.5s infinite;
  }

  @keyframes skeleton-loading {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .skeleton-card {
    height: 350px;
    border-radius: 12px;
  }

  .movie-poster {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
    background-color: #111;
  }

  .movie-info {
    padding: 15px;
    background: linear-gradient(to top, #000, var(--card-bg));
  }

  .movie-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .movie-plex-release {
    color: var(--accent-color);
    font-size: 11px;
    font-weight: bold;
    background: rgba(255, 140, 0, 0.1);
    padding: 3px 8px;
    border-radius: 4px;
    display: inline-block;
  }

  .movie-rating {
    color: #ffd700;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
  }

  /* Modal */
  .modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.92);
    backdrop-filter: blur(10px);
    overflow: hidden;
  }

  .modal-content {
    background-color: #111;
    margin: 4vh auto;
    border-radius: 18px;
    max-width: 850px;
    width: 95%;
    max-height: 88vh;
    overflow-y: auto;
    position: relative;
    border: 1px solid rgba(255, 255, 255, 0.08);
  }

  .close {
    position: absolute;
    right: 20px;
    top: 15px;
    color: #fff;
    font-size: 35px;
    cursor: pointer;
    z-index: 10;
    text-shadow: 0 0 10px #000;
  }

  .movie-details { padding: 30px; }
  .movie-details h2 { font-size: 28px; margin-bottom: 15px; color: #fff; font-weight: 800; }
  .detail-grid { display: flex; gap: 20px; margin-bottom: 20px; font-size: 13px; color: #888; }
  .synopsis { line-height: 1.7; color: #ddd; font-size: 15px; border-top: 1px solid #222; padding-top: 20px; }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--primary-color); }
</style>
</head>
<body>

  <header class="header">
    <div class="header-content">
      <div class="logo-title">Cinoche FR</div>
      <div class="search-container">
        <div class="search-bar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" id="searchInput" class="search-input" placeholder="Rechercher...">
        </div>
        <div class="search-options">
          <label><input type="radio" name="searchType" value="movie" checked> Films</label>
          <label><input type="radio" name="searchType" value="tv"> Séries</label>
        </div>
      </div>
    </div>
  </header>

  <div class="container" style="max-width: 1200px; margin: 0 auto; padding: 0 20px;">
    <div class="categories" id="categories">
      <button class="category-button active" data-category="popular">Films Populaires</button>
      <button class="category-button" data-category="popular_series">Séries</button>
      <button class="category-button" data-category="upcoming">Au Cinéma</button>
      <button class="category-button" data-category="coming_to_plex">Bientôt sur Plex</button>
      <a href="https://discord.gg/mej5QrpnNb" target="_blank" class="category-button" style="border-color: #5865F2; color: #5865F2;">Discord</a>
    </div>
    
    <div id="statusMessage" style="text-align: center; color: var(--primary-color); display: none; margin-bottom: 20px;"></div>
    <div class="movie-grid" id="movieGrid"></div>
  </div>

  <div id="movieModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <div id="trailerWrapper" style="position: relative; padding-bottom: 56.25%; height: 0; background: #000; display: none;">
        <iframe id="movieTrailer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" src="" frameborder="0" allowfullscreen></iframe>
      </div>
      <div class="movie-details" id="movieDetails"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
document.addEventListener('DOMContentLoaded', function () {
  const API_KEY = '3fd2be6f0c70a2a598f084ddfb75487c';
  const BASE_URL = 'https://api.themoviedb.org/3';
  const IMG_URL = 'https://image.tmdb.org/t/p/w500';

  const plexMovies = [
    { "title": "Les enfants vont bien", "plex_release": "2 Avril 2026", "tmdb_id": 1277882, "poster_path": "/yNtWCh8HyamzUStLQdEgJ7xxBPX.jpg" },
    { "title": "The Shadow's Edge", "plex_release": "4 Avril 2026", "tmdb_id": 1419406, "poster_path": "/t1PFVsGYdUHtPv0Xowoc9b4PAap.jpg" },
    { "title": "La Condition", "plex_release": "7 Avril 2026", "tmdb_id": 1119548, "poster_path": "/5yxwpcK0OHR0fBB6CBS80YWHoAC.jpg" },
    { "title": "À la poursuite du Père Noël !", "plex_release": "9 Avril 2026", "tmdb_id": 1432812, "poster_path": "/jQev7aQ6iVJnR0BAliIoxy0kuSL.jpg" },
    { "title": "Chasse gardée 2", "plex_release": "9 Avril 2026", "tmdb_id": 1437985, "poster_path": "/9PJrHGp41hRTq2kkPWU2j6zzjat.jpg" },
    { "title": "Louise", "plex_release": "10 Avril 2026", "tmdb_id": 1197125, "poster_path": "/62GcSVw9fE8paRDTCHDycZvQ26p.jpg" },
    { "title": "Animal Totem", "plex_release": "10 Avril 2026", "tmdb_id": 1439177, "poster_path": "/5mQOefrjyMEq8qaFagEVX2i4SH8.jpg" },
    { "title": "Qui brille au combat", "plex_release": "15 Avril 2026", "tmdb_id": 1308618, "poster_path": "/yv7esvFjaIbCzu3LViHAFmXviCB.jpg" },
    { "title": "Greenland : Migration", "plex_release": "15 Avril 2026", "tmdb_id": 840464, "poster_path": "/mu05wZK0MH2bYmuO7hXwZECqC1X.jpg" },
    { "title": "La pire mère au monde", "plex_release": "16 Avril 2026", "tmdb_id": 1235277, "poster_path": "/aM3ZwratInjyFyckQzXE4owylgk.jpg" },
    { "title": "L’Âme Idéale", "plex_release": "17 Avril 2026", "tmdb_id": 1166170, "poster_path": "/ws9wCKrqMsS700OOScv8L52wJMa.jpg" },
    { "title": "Projet dernière chance", "plex_release": "28 Avril 2026", "tmdb_id": 687163, "poster_path": "/wzyy8ZrsuHfAt4iz4iH3rT0tdoT.jpg" }
  ];

  // Affiche des squelettes animés avant le chargement
  function showSkeletons() {
    const grid = document.getElementById('movieGrid');
    grid.innerHTML = '';
    for (let i = 0; i < 12; i++) {
      const skel = document.createElement('div');
      skel.classList.add('skeleton', 'skeleton-card');
      grid.appendChild(skel);
    }
  }

  async function fetchMovies(category = 'popular') {
    showSkeletons();
    try {
      let items = [];
      if (category === 'coming_to_plex') {
        items = plexMovies;
      } else if (category === 'popular_series') {
        const res = await axios.get(`${BASE_URL}/tv/popular?api_key=${API_KEY}&language=fr-FR`);
        items = res.data.results.map(i => ({...i, media_type: 'tv'}));
      } else {
        const res = await axios.get(`${BASE_URL}/movie/${category}?api_key=${API_KEY}&language=fr-FR&region=FR`);
        items = res.data.results.map(i => ({...i, media_type: 'movie'}));
      }
      displayMovies(items, category);
    } catch (err) { console.error(err); }
  }

  function displayMovies(items, category) {
    const grid = document.getElementById('movieGrid');
    grid.innerHTML = '';
    items.forEach(item => {
      const card = document.createElement('div');
      card.classList.add('movie-card');
      const title = item.title || item.name;
      const poster = item.poster_path ? IMG_URL + item.poster_path : 'https://via.placeholder.com/500x750?text=Pas+d%27image';
      const isTV = item.media_type === 'tv' || category === 'popular_series';
      
      card.innerHTML = `
        <img src="${poster}" class="movie-poster" loading="lazy">
        <div class="movie-info">
          <div class="movie-title">${title}</div>
          ${category === 'coming_to_plex' ? `<div class="movie-plex-release">${item.plex_release}</div>` : 
          `<div class="movie-rating">⭐ ${item.vote_average ? item.vote_average.toFixed(1) : 'N/A'}</div>`}
        </div>`;
      card.onclick = () => openDetailsModal(item.tmdb_id || item.id, isTV ? 'tv' : 'movie');
      grid.appendChild(card);
    });
  }

  async function openDetailsModal(id, type = 'movie') {
    const modal = document.getElementById('movieModal');
    const trailerEl = document.getElementById('movieTrailer');
    const trailerWrapper = document.getElementById('trailerWrapper');
    const detailsEl = document.getElementById('movieDetails');
    
    modal.style.display = 'block';
    detailsEl.innerHTML = '<p style="text-align:center">Chargement...</p>';
    
    try {
      const res = await axios.get(`${BASE_URL}/${type}/${id}?api_key=${API_KEY}&append_to_response=videos&language=fr-FR`);
      const data = res.data;
      
      // Gestion intelligente du trailer
      const trailer = data.videos.results.find(v => v.type === 'Trailer' && v.site === 'YouTube');
      if (trailer) {
        trailerEl.src = `https://www.youtube.com/embed/${trailer.key}?autoplay=1`;
        trailerWrapper.style.display = 'block';
      } else {
        trailerEl.src = '';
        trailerWrapper.style.display = 'none';
      }

      detailsEl.innerHTML = `
        <h2>${data.title || data.name}</h2>
        <div class="detail-grid">
          <span>Sortie: ${data.release_date || data.first_air_date || 'Inconnue'}</span>
          <span>Note: ${data.vote_average ? data.vote_average.toFixed(1) : '?'}/10</span>
        </div>
        <p class="synopsis">${data.overview || "Pas de synopsis disponible en français."}</p>
      `;
    } catch (err) { 
      console.error(err);
      detailsEl.innerHTML = '<p>Erreur lors de la récupération des détails.</p>';
    }
  }

  // Fermeture du modal
  const closeModal = () => {
    const modal = document.getElementById('movieModal');
    modal.style.display = 'none';
    document.getElementById('movieTrailer').src = '';
  };

  document.querySelector('.close').onclick = closeModal;

  // Accessibilité : Fermer avec clic extérieur
  window.onclick = (event) => {
    const modal = document.getElementById('movieModal');
    if (event.target == modal) closeModal();
  };

  // Accessibilité : Fermer avec Echap
  document.addEventListener('keydown', (event) => {
    if (event.key === "Escape") closeModal();
  });

  function debounce(func, timeout = 300) {
    let timer;
    return (...args) => { clearTimeout(timer); timer = setTimeout(() => { func.apply(this, args); }, timeout); };
  }

  const handleSearch = debounce(async () => {
    const query = document.getElementById('searchInput').value.trim();
    const type = document.querySelector('input[name="searchType"]:checked').value;
    if (query.length < 2) { 
        if (query.length === 0) fetchMovies('popular'); 
        return; 
    }
    showSkeletons();
    try {
      const res = await axios.get(`${BASE_URL}/search/${type}?api_key=${API_KEY}&query=${query}&language=fr-FR`);
      displayMovies(res.data.results.map(i => ({...i, media_type: type})), 'search');
    } catch (err) { console.error(err); }
  });

  document.getElementById('searchInput').addEventListener('input', handleSearch);

  document.querySelectorAll('.category-button').forEach(btn => {
    btn.onclick = function() {
      if(this.dataset.category) {
        document.querySelectorAll('.category-button').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        fetchMovies(this.dataset.category);
      }
    }
  });

  fetchMovies();
});
</script>
</body>
</html>
